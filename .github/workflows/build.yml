name: Release
on: [ push ]

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [ ubuntu-24.04, windows-latest ]
    runs-on: ${{ matrix.platform }}
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Linux dependencies
      if: matrix.platform == 'ubuntu-24.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          ca-certificates

        # Force refresh system SSL certificates so linuxdeploy's downing script doesn't fail
        sudo update-ca-certificates -f

    - name: Install Frontend Deps
      run: npm install

    - name: Build App
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Fixes inner execution issues in containerized CI environments
        APPIMAGE_EXTRACT_AND_RUN: 1
        # Fixes the binary relocation layout stripping bug on Ubuntu 24.04
        NO_STRIP: true
      with:
        includeRelease: true
